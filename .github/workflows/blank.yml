name: AYRA Auto Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          ZIP=$(find . -name "*.zip" | grep -v ".git" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP"
            unzip -o "$ZIP" -d /tmp/extracted/
            ROOT=$(find /tmp/extracted -maxdepth 5 -name "settings.gradle" | head -1 | xargs dirname)
            echo "Root: $ROOT"
            cp -r "$ROOT"/. $GITHUB_WORKSPACE/
          fi
          ls -la

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Fix build files
        run: |
          echo 'plugins { id "com.android.application" version "8.1.4" apply false' > build.gradle
          echo '         id "org.jetbrains.kotlin.android" version "1.9.22" apply false }' >> build.gradle

          printf 'plugins {\n  id "com.android.application"\n  id "org.jetbrains.kotlin.android"\n}\n' > app/build.gradle
          printf 'android {\n  namespace "com.ayra.assistant"\n  compileSdk 34\n' >> app/build.gradle
          printf '  defaultConfig {\n    applicationId "com.ayra.assistant"\n    minSdk 26\n    targetSdk 34\n    versionCode 1\n    versionName "1.0"\n  }\n' >> app/build.gradle
          printf '  buildTypes { debug { debuggable true } }\n' >> app/build.gradle
          printf '  compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }\n' >> app/build.gradle
          printf '  kotlinOptions { jvmTarget = "17" }\n' >> app/build.gradle
          printf '  buildFeatures { viewBinding true }\n}\n' >> app/build.gradle
          printf 'dependencies {\n' >> app/build.gradle
          printf '  implementation "androidx.core:core-ktx:1.12.0"\n' >> app/build.gradle
          printf '  implementation "androidx.appcompat:appcompat:1.6.1"\n' >> app/build.gradle
          printf '  implementation "com.google.android.material:material:1.11.0"\n' >> app/build.gradle
          printf '  implementation "androidx.constraintlayout:constraintlayout:2.1.4"\n' >> app/build.gradle
          printf '  implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0"\n' >> app/build.gradle
          printf '  implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.7.0"\n' >> app/build.gradle
          printf '  implementation "androidx.activity:activity-ktx:1.8.2"\n' >> app/build.gradle
          printf '  implementation "com.squareup.okhttp3:okhttp:4.12.0"\n' >> app/build.gradle
          printf '  implementation "com.google.code.gson:gson:2.10.1"\n' >> app/build.gradle
          printf '  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"\n' >> app/build.gradle
          printf '  implementation "com.airbnb.android:lottie:6.3.0"\n' >> app/build.gradle
          printf '  implementation "androidx.preference:preference-ktx:1.2.1"\n' >> app/build.gradle
          printf '}\n' >> app/build.gradle

          printf 'pluginManagement {\n  repositories { google(); mavenCentral(); gradlePluginPortal() }\n}\n' > settings.gradle
          printf 'dependencyResolutionManagement {\n  repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n  repositories { google(); mavenCentral() }\n}\n' >> settings.gradle
          printf 'rootProject.name = "AYRA"\ninclude ":app"\n' >> settings.gradle

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

          touch app/proguard-rules.pro
          echo "Build files fixed"

      - name: Create Lottie Assets
        run: |
          mkdir -p app/src/main/assets
          LOTTIE='{"v":"5.5.7","fr":30,"ip":0,"op":60,"w":200,"h":200,"nm":"orb","ddd":0,"assets":[],"layers":[{"ddd":0,"ind":1,"ty":4,"nm":"c","sr":1,"ks":{"o":{"a":0,"k":100},"r":{"a":1,"k":[{"i":{"x":[0.833],"y":[0.833]},"o":{"x":[0.167],"y":[0.167]},"t":0,"s":[0]},{"t":60,"s":[360]}]},"p":{"a":0,"k":[100,100,0]},"a":{"a":0,"k":[0,0,0]},"s":{"a":0,"k":[100,100,100]}},"ao":0,"shapes":[{"ty":"el","p":{"a":0,"k":[0,0]},"s":{"a":0,"k":[80,80]}},{"ty":"fl","c":{"a":0,"k":[0.608,0.349,1,1]},"o":{"a":0,"k":100}}],"ip":0,"op":60,"st":0,"bm":0}]}'
          echo "$LOTTIE" > app/src/main/assets/ayra_orb.json
          echo "$LOTTIE" > app/src/main/assets/ayra_splash.json

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AYRA-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show Error on Failure
        if: failure()
        run: find . -name "*.log" -path "*/build/*" 2>/dev/null | xargs cat 2>/dev/null | tail -80 || true
