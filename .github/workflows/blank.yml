name: 🤖 AYRA Auto Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Unzip & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Find & Extract ZIP
        run: |
          ZIP=$(find . -name "*.zip" | grep -v ".git" | head -1)
          if [ -z "$ZIP" ]; then
            echo "No ZIP found - using repo files directly"
          else
            echo "✅ Found ZIP: $ZIP"
            mkdir -p /tmp/ayra_extracted
            unzip -o "$ZIP" -d /tmp/ayra_extracted/
            ROOT=$(find /tmp/ayra_extracted -maxdepth 5 -name "settings.gradle" | head -1 | xargs dirname)
            echo "Project root: $ROOT"
            cp -r "$ROOT"/. $GITHUB_WORKSPACE/
          fi
          echo "=== Workspace ==="
          ls -la $GITHUB_WORKSPACE/

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          echo "JAR: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: 🔧 Fix gradlew
        run: |
          if [ ! -f gradlew ]; then
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4/gradlew" -o gradlew
          fi
          chmod +x gradlew

      - name: 🔧 Fix build.gradle files
        run: |
          # Overwrite root build.gradle - clean plugins style
          cat > build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.1.4' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
}
EOF

          # Overwrite app/build.gradle - clean and simple
          cat > app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ayra.assistant'
    compileSdk 34

    defaultConfig {
        applicationId "com.ayra.assistant"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'com.airbnb.android:lottie:6.3.0'
    implementation 'androidx.preference:preference-ktx:1.2.1'
}
EOF

          # Overwrite settings.gradle
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "AYRA"
include ':app'
EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.daemon=false
EOF

          # proguard placeholder
          touch app/proguard-rules.pro

          echo "✅ All build files overwritten"

      - name: 🎨 Create Lottie Assets
        run: |
          mkdir -p app/src/main/assets
          LOTTIE='{"v":"5.5.7","fr":30,"ip":0,"op":60,"w":200,"h":200,"nm":"orb","ddd":0,"assets":[],"layers":[{"ddd":0,"ind":1,"ty":4,"nm":"c","sr":1,"ks":{"o":{"a":0,"k":100},"r":{"a":1,"k":[{"i":{"x":[0.833],"y":[0.833]},"o":{"x":[0.167],"y":[0.167]},"t":0,"s":[0]},{"t":60,"s":[360]}]},"p":{"a":0,"k":[100,100,0]},"a":{"a":0,"k":[0,0,0]},"s":{"a":0,"k":[100,100,100]}},"ao":0,"shapes":[{"ty":"el","p":{"a":0,"k":[0,0]},"s":{"a":0,"k":[80,80]}},{"ty":"fl","c":{"a":0,"k":[0.608,0.349,1,1]},"o":{"a":0,"k":100}}],"ip":0,"op":60,"st":0,"bm":0}]}'
          [ ! -f app/src/main/assets/ayra_orb.json ]    && echo "$LOTTIE" > app/src/main/assets/ayra_orb.json
          [ ! -f app/src/main/assets/ayra_splash.json ] && echo "$LOTTIE" > app/src/main/assets/ayra_splash.json

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon \
            --info \
            2>&1 | tail -100
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AYRA-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📋 Show Error Log (on failure)
        if: failure()
        run: |
          echo "=== FULL BUILD LOG ==="
          find . -name "*.log" -path "*/build/*" 2>/dev/null | head -5 | xargs cat 2>/dev/null || true
          echo "=== Workspace files ==="
          ls -la
          echo "=== app/ files ==="
          ls -la app/ || true
          echo "=== gradle wrapper ==="
          ls -la gradle/wrapper/ || true

      - name: 🎉 Done
        if: success()
        run: |
          echo "✅ AYRA APK Build সফল!"
          ls -lh app/build/outputs/apk/debug/
